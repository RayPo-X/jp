<!DOCTYPE html>
<html>
<head>
<style>
  table { border-collapse: collapse; table-layout: fixed; width: 300px; border: 1px solid black;}
  th, td { border: 1px solid black; padding: 10px; }
  
  /* The line-clamp trick */
  .cell-content {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    white-space: normal;
    word-break: break-all;
  }
</style>
</head>
<body>
  <table>
    <tr><th style="width: 50px;">Col1</th><th style="width: 250px;">Col2</th></tr>
    <tr>
      <td><div class="cell-content">Very long text here that should be cut off after exactly two lines. Let's see if it works. Yes it should.</div></td>
      <td><div class="cell-content">Short text</div></td>
    </tr>
  </table>
</body>
</html>
